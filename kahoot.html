<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<style>
:root {
  --red: #e63946; --blue: #1d6fa4; --bg: #0d1117; --surface: #161b22;
  --card: #21262d; --border: #30363d; --text: #e6edf3; --muted: #7d8590;
  --green: #2ea043; --purple: #7c3aed; --yellow: #d4a017;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* SETUP */
.setup { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
.setup-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
.setup-sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
.timer-row { display: flex; align-items: center; gap: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.25rem; margin-bottom: 1.5rem; }
.timer-row label { flex: 1; font-size: 0.9rem; }
.timer-row input[type=number] { width: 72px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 1.05rem; font-weight: 700; padding: 0.35rem 0.75rem; text-align: center; outline: none; font-family: inherit; }
.timer-row input[type=number]:focus { border-color: var(--purple); }
.timer-row span { color: var(--muted); font-size: 0.85rem; }
.q-list { display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 1rem; }
.q-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.2rem; display: flex; flex-direction: column; gap: 0.9rem; }
.q-card-top { display: grid; grid-template-columns: 80px 1fr 28px; gap: 0.9rem; align-items: start; }
.thumb { width: 80px; height: 60px; border-radius: 8px; border: 1.5px dashed var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; flex-shrink: 0; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.thumb-hint { font-size: 0.65rem; color: var(--muted); text-align: center; pointer-events: none; line-height: 1.5; }
.q-num-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
.q-title-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 0.9rem; padding: 0.4rem 0.7rem; font-family: inherit; outline: none; margin-top: 0.5rem; }
.q-title-input:focus { border-color: var(--purple); }
.q-title-input::placeholder { color: var(--muted); }
.del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 2px; border-radius: 5px; font-family: inherit; transition: color 0.15s; line-height: 1; }
.del-btn:hover { color: #ef4444; }
.opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
.opt-row { border-radius: 9px; padding: 0.7rem 0.85rem; display: flex; flex-direction: column; gap: 0.45rem; border: 1.5px solid transparent; cursor: pointer; transition: all 0.15s; }
.opt-row.circle-row { background: rgba(230,57,70,0.07); border-color: rgba(230,57,70,0.25); }
.opt-row.triangle-row { background: rgba(29,111,164,0.07); border-color: rgba(29,111,164,0.25); }
.opt-row.circle-row.selected { border-color: var(--red); background: rgba(230,57,70,0.14); }
.opt-row.triangle-row.selected { border-color: var(--blue); background: rgba(29,111,164,0.15); }
.opt-header { display: flex; align-items: center; gap: 0.5rem; }
.opt-tag { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.circle-row .opt-tag { color: #e68088; }
.triangle-row .opt-tag { color: #6aadd5; }
.correct-badge { margin-left: auto; font-size: 0.65rem; font-weight: 700; background: rgba(46,160,67,0.2); color: #56d364; padding: 2px 7px; border-radius: 4px; }
.opt-text-input { width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; padding: 0.35rem 0.6rem; font-family: inherit; outline: none; resize: none; }
.opt-text-input:focus { border-color: var(--muted); }
.opt-text-input::placeholder { color: var(--muted); }
.correct-select-hint { font-size: 0.7rem; color: var(--muted); text-align: center; }
.add-btn { width: 100%; padding: 0.7rem; background: var(--surface); border: 1px dashed var(--border); border-radius: 9px; color: var(--muted); cursor: pointer; font-size: 0.875rem; font-family: inherit; margin-bottom: 0.85rem; transition: all 0.15s; }
.add-btn:hover { background: var(--card); color: var(--text); border-color: var(--muted); }
.start-btn { width: 100%; padding: 0.85rem; background: var(--green); border: none; border-radius: 9px; color: #fff; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.15s; }
.start-btn:hover:not(:disabled) { background: #3fb950; }
.start-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

/* GAME */
.game { display: none; flex-direction: column; min-height: 100vh; }
.g-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.75rem; background: var(--surface); border-bottom: 1px solid var(--border); gap: 1rem; }
.g-counter { font-size: 0.875rem; color: var(--muted); min-width: 120px; }
.g-timer { font-size: 3rem; font-weight: 900; letter-spacing: -0.04em; min-width: 90px; text-align: center; line-height: 1; transition: color 0.3s; }
.g-timer.urgent { color: #ef4444; animation: pulse 0.5s ease-in-out infinite alternate; }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
.back-btn { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.15s; min-width: 90px; }
.back-btn:hover { border-color: var(--muted); color: var(--text); }
.bar-wrap { height: 5px; background: var(--border); }
.bar { height: 100%; background: var(--purple); transition: width 1s linear, background 0.3s; }
.bar.urgent { background: #ef4444; }
.g-image { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem 2rem 0.5rem; min-height: 120px; }
.g-image img { max-height: 36vh; max-width: min(600px, 90vw); border-radius: 12px; object-fit: contain; display: block; }
.g-q-title { text-align: center; font-size: 1.2rem; font-weight: 700; padding: 0.3rem 1.5rem 0.6rem; }
.g-hint { text-align: center; font-size: 0.78rem; color: var(--muted); padding-bottom: 0.6rem; letter-spacing: 0.02em; }

.g-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 0 1.5rem 0.75rem; max-width: 720px; width: 100%; margin: 0 auto; }

.opt-card {
  border-radius: 16px; padding: 1.5rem 1rem;
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
  border: 3px solid transparent; cursor: pointer;
  transition: transform 0.25s ease, opacity 0.35s, box-shadow 0.35s, border-color 0.2s, background 0.2s;
  user-select: none;
}
.opt-card-circle { background: rgba(230,57,70,0.1); border-color: rgba(230,57,70,0.4); }
.opt-card-triangle { background: rgba(29,111,164,0.1); border-color: rgba(29,111,164,0.4); }
.opt-card:hover:not(.locked) { transform: scale(1.03); }
.opt-card svg { width: 72px; height: 72px; }
.opt-card-lbl { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.opt-card-circle .opt-card-lbl { color: #e68088; }
.opt-card-triangle .opt-card-lbl { color: #6aadd5; }
.opt-card-text { font-size: 1.1rem; font-weight: 600; text-align: center; color: var(--text); line-height: 1.3; padding: 0 0.25rem; }

/* STUDENT PICK — amarillo */
.opt-card.student-pick {
  border-color: #f0c040;
  background: rgba(240,192,64,0.15);
  box-shadow: 0 0 18px rgba(240,192,64,0.25);
  transform: scale(1.04);
}
.opt-card.student-pick .opt-card-lbl { color: #f0c040; }

/* VERIFY STATES */
.opt-card.correct {
  border-color: #2ea043;
  background: rgba(46,160,67,0.18);
  box-shadow: 0 0 36px rgba(46,160,67,0.4);
  transform: scale(1.07);
}
.opt-card.correct .opt-card-lbl { color: #56d364; }
.opt-card.wrong { opacity: 0.18; transform: scale(0.92); cursor: default; }
.opt-card.locked { cursor: default; }

.g-controls { padding: 0.75rem 1.5rem 2rem; display: flex; gap: 0.85rem; justify-content: center; max-width: 720px; width: 100%; margin: 0 auto; }
.verify-btn { flex: 1; padding: 0.9rem; background: var(--purple); border: none; border-radius: 11px; color: #fff; font-size: 1.05rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
.verify-btn:hover:not(:disabled) { background: #6d28d9; }
.verify-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.next-btn { flex: 1; padding: 0.9rem; background: var(--green); border: none; border-radius: 11px; color: #fff; font-size: 1.05rem; font-weight: 700; font-family: inherit; cursor: pointer; display: none; transition: background 0.15s; }
.next-btn:hover { background: #3fb950; }

/* CONFETTI CANVAS */
#confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 999; }

/* CELEBRATION TEXT */
#celebrationText {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0);
  z-index: 1000; pointer-events: none;
  font-size: 4rem; font-weight: 900; letter-spacing: -0.03em;
  color: #fff; text-shadow: 0 4px 24px rgba(0,0,0,0.5);
  background: linear-gradient(135deg, #f0c040, #56d364);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.4s;
  white-space: nowrap;
}
#celebrationText.show { transform: translate(-50%,-50%) scale(1); }
#celebrationText.hide { transform: translate(-50%,-50%) scale(0); opacity: 0; }
.save-btn, .load-btn {
  flex: 1; padding: 0.65rem; background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; color: var(--muted); cursor: pointer; font-size: 0.85rem;
  font-family: inherit; text-align: center; transition: all 0.15s; display: block;
}
.save-btn:hover, .load-btn:hover { background: var(--card); color: var(--text); border-color: var(--muted); }
.autosave-badge { font-size: 0.7rem; color: var(--muted); text-align: right; margin-bottom: 0.4rem; height: 1rem; }
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>
<div id="celebrationText">¡Correcto! 🎉</div>

<!-- SETUP -->
<div class="setup" id="setupView">
  <h1 class="setup-title">Quiz</h1>
  <p class="setup-sub">Sube imágenes, escribe las opciones, marca cuál es correcta y ajusta el tiempo.</p>
  <div class="timer-row">
    <label>⏱ Tiempo por pregunta</label>
    <input type="number" id="globalTimer" value="30" min="5" max="180">
    <span>segundos</span>
  </div>
  <div class="autosave-badge" id="autosaveBadge"></div>
  <div class="q-list" id="qList"></div>
  <div style="display:flex;gap:0.6rem;margin-bottom:0.85rem">
    <button class="save-btn" onclick="saveBank()">↓ Guardar banco</button>
    <label class="load-btn">↑ Cargar banco<input type="file" accept=".json" onchange="loadBank(this)" style="display:none"></label>
  </div>
  <button class="add-btn" onclick="addQ()">+ Agregar pregunta</button>
  <button class="start-btn" id="startBtn" onclick="startGame()" disabled>▶ Iniciar</button>
</div>

<!-- GAME -->
<div class="game" id="gameView">
  <div class="g-header">
    <button class="back-btn" onclick="backToSetup()">← Volver</button>
    <div class="g-timer" id="timerNum">30</div>
    <span class="g-counter" id="gCounter" style="text-align:right">Pregunta 1 de 1</span>
  </div>
  <div class="bar-wrap"><div class="bar" id="timerBar" style="width:100%"></div></div>
  <div class="g-image"><img id="gImg" src="" alt="" style="display:none"></div>
  <div class="g-q-title" id="gTitle"></div>
  <div class="g-hint" id="gHint">Toca la opción que dijeron los estudiantes</div>
  <div class="g-options">
    <div class="opt-card opt-card-circle" id="optC" onclick="pickOption('circle')">
      <svg viewBox="0 0 72 72"><circle cx="36" cy="36" r="30" fill="#e63946"/></svg>
      <span class="opt-card-lbl">Círculo rojo</span>
      <span class="opt-card-text" id="gTextC"></span>
    </div>
    <div class="opt-card opt-card-triangle" id="optT" onclick="pickOption('triangle')">
      <svg viewBox="0 0 72 72"><polygon points="36,5 68,63 4,63" fill="#1d6fa4"/></svg>
      <span class="opt-card-lbl">Triángulo azul</span>
      <span class="opt-card-text" id="gTextT"></span>
    </div>
  </div>
  <div class="g-controls">
    <button class="verify-btn" id="verifyBtn" onclick="verify()">✓ Verificar</button>
    <button class="next-btn" id="nextBtn">Siguiente →</button>
  </div>
</div>

<script>
let qs = [], idx = 0, iv = null, tLeft = 0, tTotal = 30, verified = false, studentPick = null;
const $ = id => document.getElementById(id);

function getTime() { return parseInt($('globalTimer').value) || 30; }

function addQ() { qs.push({ id: Date.now(), img: null, title: '', textC: '', textT: '', correct: null }); render(); autosave(); }
function removeQ(id) { qs = qs.filter(q => q.id !== id); render(); autosave(); }
function setCorrect(id, val) { const q = qs.find(q => q.id === id); if (q) { q.correct = val; render(); autosave(); } }
function setField(id, field, val) { const q = qs.find(q => q.id === id); if (q) q[field] = val; checkReady(); autosave(); }
function handleImg(id, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { const q = qs.find(q => q.id === id); if (q) { q.img = e.target.result; render(); autosave(); } };
  reader.readAsDataURL(file);
}
function checkReady() {
  const ready = qs.length > 0 && qs.every(q => q.correct && (q.textC.trim() || q.textT.trim()));
  $('startBtn').disabled = !ready;
}
function render() {
  $('qList').innerHTML = qs.map((q, i) => `
    <div class="q-card">
      <div class="q-card-top">
        <div class="thumb"><div class="thumb-hint">📷<br>Opcional</div>${q.img ? `<img src="${q.img}" alt="">` : ''}
          <input type="file" accept="image/*" onchange="handleImg(${q.id},this)">
        </div>
        <div>
          <span class="q-num-label">Pregunta ${i+1}</span>
          <input class="q-title-input" type="text" placeholder="Enunciado (opcional)" value="${q.title}" oninput="setField(${q.id},'title',this.value)">
        </div>
        <button class="del-btn" onclick="removeQ(${q.id})">✕</button>
      </div>
      <div class="opts-grid">
        <div class="opt-row circle-row ${q.correct==='circle'?'selected':''}" onclick="setCorrect(${q.id},'circle')">
          <div class="opt-header">
            <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="#e63946"/></svg>
            <span class="opt-tag">Círculo rojo</span>
            ${q.correct==='circle'?'<span class="correct-badge">✓ CORRECTA</span>':''}
          </div>
          <textarea class="opt-text-input" rows="2" placeholder="Texto del círculo..."
            onclick="event.stopPropagation()" oninput="setField(${q.id},'textC',this.value)">${q.textC}</textarea>
        </div>
        <div class="opt-row triangle-row ${q.correct==='triangle'?'selected':''}" onclick="setCorrect(${q.id},'triangle')">
          <div class="opt-header">
            <svg width="16" height="16" viewBox="0 0 16 16"><polygon points="8,2 14,13 2,13" fill="#1d6fa4"/></svg>
            <span class="opt-tag">Triángulo azul</span>
            ${q.correct==='triangle'?'<span class="correct-badge">✓ CORRECTA</span>':''}
          </div>
          <textarea class="opt-text-input" rows="2" placeholder="Texto del triángulo..."
            onclick="event.stopPropagation()" oninput="setField(${q.id},'textT',this.value)">${q.textT}</textarea>
        </div>
      </div>
      <p class="correct-select-hint">Haz clic en la tarjeta para marcar la correcta</p>
    </div>`).join('');
  checkReady();
}

function startGame() {
  idx = 0; $('setupView').style.display = 'none'; $('gameView').style.display = 'flex'; showQ();
}
function backToSetup() {
  clearInterval(iv); $('gameView').style.display = 'none'; $('setupView').style.display = 'block';
}

function showQ() {
  verified = false; studentPick = null;
  const q = qs[idx]; tTotal = getTime(); tLeft = tTotal;
  $('gCounter').textContent = `Pregunta ${idx+1} de ${qs.length}`;
  $('gTitle').textContent = q.title || '';
  $('gTextC').textContent = q.textC;
  $('gTextT').textContent = q.textT;
  $('gHint').textContent = 'Toca la opción que dijeron los estudiantes';
  const img = $('gImg');
  if (q.img) { img.src = q.img; img.style.display = 'block'; } else { img.src = ''; img.style.display = 'none'; }
  $('timerNum').textContent = tLeft;
  $('timerNum').classList.remove('urgent');
  $('timerBar').style.width = '100%';
  $('timerBar').classList.remove('urgent');
  $('optC').className = 'opt-card opt-card-circle';
  $('optT').className = 'opt-card opt-card-triangle';
  $('verifyBtn').disabled = false;
  $('verifyBtn').style.display = 'inline-block';
  $('nextBtn').style.display = 'none';
  $('nextBtn').textContent = 'Siguiente →';
  $('nextBtn').onclick = nextQ;
  clearInterval(iv);
  iv = setInterval(() => {
    tLeft--;
    $('timerNum').textContent = tLeft;
    $('timerBar').style.width = (tLeft / tTotal * 100) + '%';
    if (tLeft <= 10) { $('timerNum').classList.add('urgent'); $('timerBar').classList.add('urgent'); }
    if (tLeft <= 0) clearInterval(iv);
  }, 1000);
}

function pickOption(val) {
  if (verified) return;
  studentPick = val;
  $('optC').className = 'opt-card opt-card-circle' + (val === 'circle' ? ' student-pick' : '');
  $('optT').className = 'opt-card opt-card-triangle' + (val === 'triangle' ? ' student-pick' : '');
  $('gHint').textContent = val === 'circle' ? '🟡 Seleccionado: Círculo rojo' : '🟡 Seleccionado: Triángulo azul';
}

function verify() {
  if (verified) return;
  verified = true;
  clearInterval(iv);
  $('verifyBtn').disabled = true;
  $('gHint').textContent = '';
  const q = qs[idx];
  const isCircleCorrect = q.correct === 'circle';

  // lock hover
  $('optC').classList.add('locked');
  $('optT').classList.add('locked');

  const correctEl = isCircleCorrect ? $('optC') : $('optT');
  const wrongEl   = isCircleCorrect ? $('optT') : $('optC');

  correctEl.classList.add('correct');
  wrongEl.classList.remove('student-pick');
  wrongEl.classList.add('wrong');

  const gotItRight = studentPick && studentPick === q.correct;
  if (gotItRight) launchConfetti();

  $('nextBtn').style.display = 'inline-block';
  if (idx === qs.length - 1) {
    $('nextBtn').textContent = '✓ Finalizar';
    $('nextBtn').onclick = backToSetup;
  }
}

function nextQ() { idx++; if (idx < qs.length) showQ(); }

/* ── CONFETTI ── */
function launchConfetti() {
  const canvas = $('confettiCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const colors = ['#f0c040','#56d364','#e63946','#7c3aed','#1d6fa4','#ff9f43','#ffffff','#ff6b6b','#48dbfb'];
  const pieces = [];

  for (let i = 0; i < 220; i++) {
    const fromSide = Math.random() > 0.4;
    pieces.push({
      x: fromSide ? (Math.random() > 0.5 ? -10 : canvas.width + 10) : Math.random() * canvas.width,
      y: fromSide ? Math.random() * canvas.height * 0.5 : -20,
      vx: fromSide ? (Math.random() * 6 + 2) * (Math.random() > 0.5 ? 1 : -1) : (Math.random() - 0.5) * 7,
      vy: Math.random() * 5 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      w: Math.random() * 10 + 5,
      h: Math.random() * 5 + 3,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      shape: Math.random() > 0.35 ? 'rect' : 'circle',
      drag: 0.99
    });
  }

  const cel = $('celebrationText');
  cel.classList.remove('hide');
  cel.classList.add('show');
  setTimeout(() => { cel.classList.add('hide'); setTimeout(() => cel.classList.remove('show','hide'), 400); }, 2200);

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= p.drag; p.rot += p.rotV;
      if (p.y > canvas.height + 20) return;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, p.w/2, 0, Math.PI*2); ctx.fill(); }
      else { ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); }
      ctx.restore();
    });
    frame++;
    if (frame < 240) requestAnimationFrame(draw);
    else { canvas.style.display = 'none'; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  draw();
}

function saveBank() {
  const data = { timer: getTime(), questions: qs.map(q => ({ ...q })) };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'banco-preguntas.json';
  a.click();
}
function loadBank(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.questions) {
        qs = data.questions;
        if (data.timer) document.getElementById('globalTimer').value = data.timer;
        render();
        autosave();
      }
    } catch(err) { alert('Archivo no válido'); }
  };
  reader.readAsText(file);
  input.value = '';
}
function autosave() {
  try {
    localStorage.setItem('quiz_bank', JSON.stringify({ timer: getTime(), questions: qs }));
    const b = $('autosaveBadge');
    b.textContent = '✓ Guardado automáticamente';
    setTimeout(() => { if(b) b.textContent = ''; }, 2000);
  } catch(e) {}
}
function loadAutosave() {
  try {
    const raw = localStorage.getItem('quiz_bank');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.questions && data.questions.length > 0) {
      qs = data.questions;
      if (data.timer) document.getElementById('globalTimer').value = data.timer;
      const b = $('autosaveBadge');
      b.textContent = `✓ Banco anterior recuperado (${qs.length} pregunta${qs.length>1?'s':''})`;
      setTimeout(() => { if(b) b.textContent = ''; }, 3000);
    }
  } catch(e) {}
}

loadAutosave();
render();
</script>
